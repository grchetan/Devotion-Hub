<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up • Devotion Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-wrapper">
      <section class="auth-card">
        <h1>Create Account</h1>
        <p>Join Devotion Hub and begin your sacred progress.</p>
        <form id="signupForm" class="stack" novalidate>
          <input id="username" type="text" placeholder="Username" required />
          <input id="email" type="email" placeholder="Email" required />
          <input id="password" type="password" placeholder="Password (min 6 chars)" required />
          <input id="confirmPassword" type="password" placeholder="Confirm Password" required />
          <button type="submit" class="btn">Sign Up</button>
          <p id="formMessage" class="message"></p>
        </form>
        <p class="auth-alt">Already have an account? <a href="/login.html">Login</a></p>
        <a class="auth-alt" href="/">← Back to Home</a>
      </section>
    </main>
    <script src="/signup.js"></script>
  </body>
</html>
